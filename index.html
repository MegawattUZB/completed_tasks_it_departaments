<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Выполненные задачи</title>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
		<style>
			body {
			    font-family: 'Roboto', sans-serif;
			    background-color: #f7f9fc;
			    color: #333;
			    margin: 0;
			    padding: 0;
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			}

			.container {
			    max-width: 1000px;
			    width: 100%;
			    padding: 20px;
			}

			h2 {
			    text-align: center;
			    color: #4CAF50;
			    margin-bottom: 20px;
			    font-size: 2.5em;
			    position: relative;
			}

			h2::after {
			    content: '';
			    display: block;
			    width: 50px;
			    height: 4px;
			    background-color: #4CAF50;
			    margin: 10px auto;
			    border-radius: 2px;
			}

			.card {
			    background: linear-gradient(145deg, #ffffff, #e6e6e6);
			    border: 1px solid #ddd;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			    padding: 20px;
			    margin: 20px 0;
			    border-radius: 12px;
			    transition: transform 0.3s ease, box-shadow 0.3s ease;
			    opacity: 0;
			    transform: translateY(20px);
			    animation: fadeInUp 0.5s forwards;
			}

			@keyframes fadeInUp {
			    to {
			        opacity: 1;
			        transform: translateY(0);
			    }
			}

			.card:hover {
			    transform: translateY(-10px);
			    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
			}

			.card-header {
			    font-weight: bold;
			    color: #444;
			    margin-bottom: 10px;
			    font-size: 1.4em;
			}

			.card-body {
			    display: flex;
			    flex-direction: column;
			}

			.card-body div {
			    margin: 10px 0;
			}

			.label {
			    font-weight: bold;
			    color: #555;
			}

			.label-value {
			    color: #666;
			    margin-left: 10px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Выполненные задачи за 17.03.2026</h2>

			<div id="cardsContainer"></div>
		</div>

		<script>
			const requests = [{"Отдел":"Отдел IT","Апдейты":null,"Инициатор":"Make","Крайний срок":"2026-03-16","Ответственный":null,"Тема обращения":"🛑 Сбой в сценарии","Описание задачи / проблемы":"🛑 Сбой в сценарии Импорт переданных машин в Гугл-диск \n\nСсылка: https://eu1.make.com/131055/scenarios/2739585/logs/364768f9903d4c7e812e6b3d2e109faa"},{"Отдел":"Бухгалтерия","Апдейты":"1) Добавил графы в гугл-таблице.\n1 - Наименование задачи\n2 - Ссылка на задачу в б24\nНастроил подтягивание данных в автоматизации. (Чек-лист 1,2)\n\n2) Добавил модуль, написал формулу, оставляет только цифры удаляет все лишнее и записывает в гугл-таблице. (Чек-лист 3)","Инициатор":"Анна Лебединская","Крайний срок":"2026-03-17","Ответственный":["Аваз"],"Тема обращения":"Корректировка шаблона Запрос на оплату","Описание задачи / проблемы":"Прошу сделать следующие изменения в шаблоне \"Запрос на оплату\" (в чек-листе)\nЕсли нужны уточнения - рада буду ответить на вопросы.\nЧек-лист\n1. В гугл-таблицу нужно добавить графу \"Наименование задачи\"\n2. В гугл-таблицу нужно добавить графу \"Ссылка на задачу в б24\"\n3. В задаче в графе \"Сумма\" нужно, чтобы указывали только цифры (для того, чтобы в таблице отражались только цифры, соблюдался числовой формат)\n4. Если есть возможность, следует ограничить пользователей, которые могут создать заявку на оплату\n5. В задаче в графе \"Отдел\" следует сделать выбор отдела (сейчас пишут кто во что горазд)\n"},{"Отдел":"Бухгалтерия","Апдейты":"Создал шаблон файл Акт-сверки.\nНаписал формулы чтобы подтягивать информацию о клиенте, сумме.\nВ Изисофт в карточке клиента добавил шаблон. При распечатки ищет оплату клиента записывает каждую оплаты и общую сумму в шаблон акт-сверки.","Инициатор":"Дониёр Таджибаев","Крайний срок":"2026-03-17","Ответственный":["Аваз"],"Тема обращения":"Шаблон Акт-сверки","Описание задачи / проблемы":"Можно ли добавить шаблон акт сверки в Изисофт, где собираются все поступление денег со стороны клиента и по одному нажатию выгружать в шаблон и распечатать?\nСейчас мы это делаем через 1С.\n1С га кириб оша одам выписка бойича киргазилган боса шундо олардик лекин копинча акт сверкани оша куни или эртасига сорашади банк учун. У пайт хали выписка киритилмаган болади шуни учун биза озимиза выписка яратиб акт сверка килиб кейин выпискани удалит киб таширдик\n\nБу биринчи холат 2 чиси переброска пайитида акт сверка сорашади яни 1 лицодан 2 чи лицога пул отказишда"}];

			function formatDate(dateString) {
			    const date = new Date(dateString);
			    const day = String(date.getDate()).padStart(2, '0');
			    const month = String(date.getMonth() + 1).padStart(2, '0');
			    const year = date.getFullYear();
			    return `${day}.${month}.${year}`;
			}

			function formatDescription(description) {
			    return description.replace(/\n/g, '<br>');
			}

			const cardsContainer = document.getElementById('cardsContainer');
			requests.forEach(request => {
			    const card = document.createElement('div');
			    card.classList.add('card');

			    card.innerHTML = `
			        <div class="card-header">Инициатор: ${request['Инициатор']}</div>
			        <div class="card-body">
			            <div><span class="label">Отдел:</span><span class="label-value">${request['Отдел']}</span></div>
			            <div><span class="label">Ответственный:</span><span class="label-value">${request['Ответственный'] ? request['Ответственный'] : '-'}</span></div>
			            <div><span class="label">Крайний срок:</span><span class="label-value">${formatDate(request['Крайний срок'])}</span></div>
			            <div><span class="label">Тема обращения:</span><span class="label-value">${request['Тема обращения']}</span></div>
			            <div><span class="label">Описание задачи / проблемы:</span><span class="label-value">${formatDescription(request['Описание задачи / проблемы'])}</span></div>
			            <div><span class="label">Апдейты:</span><span class="label-value">${request['Апдейты'] ? request['Апдейты'] : ''}</span></div>
			        </div>
			    `;

			    cardsContainer.appendChild(card);
			});
		</script>
	</body>
</html>
