<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />

		<title>Выполненные задачи</title>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
		<style>
			body {
			    font-family: 'Roboto', sans-serif;
			    background-color: #f7f9fc;
			    color: #333;
			    margin: 0;
			    padding: 0;
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			}

			.container {
			    max-width: 1000px;
			    width: 100%;
			    padding: 20px;
			}

			h2 {
			    text-align: center;
			    color: #4CAF50;
			    margin-bottom: 20px;
			    font-size: 2.5em;
			    position: relative;
			}

			h2::after {
			    content: '';
			    display: block;
			    width: 50px;
			    height: 4px;
			    background-color: #4CAF50;
			    margin: 10px auto;
			    border-radius: 2px;
			}

			.card {
			    background: linear-gradient(145deg, #ffffff, #e6e6e6);
			    border: 1px solid #ddd;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			    padding: 20px;
			    margin: 20px 0;
			    border-radius: 12px;
			    transition: transform 0.3s ease, box-shadow 0.3s ease;
			    opacity: 0;
			    transform: translateY(20px);
			    animation: fadeInUp 0.5s forwards;
			}

			@keyframes fadeInUp {
			    to {
			        opacity: 1;
			        transform: translateY(0);
			    }
			}

			.card:hover {
			    transform: translateY(-10px);
			    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
			}

			.card-header {
			    font-weight: bold;
			    color: #444;
			    margin-bottom: 10px;
			    font-size: 1.4em;
			}

			.card-body {
			    display: flex;
			    flex-direction: column;
			}

			.card-body div {
			    margin: 10px 0;
			}

			.label {
			    font-weight: bold;
			    color: #555;
			}

			.label-value {
			    color: #666;
			    margin-left: 10px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Выполненные задачи за 27.04.2026</h2>

			<div id="cardsContainer"></div>
		</div>

		<script>
			const requests = [{"Отдел":"BYD Service","Апдейты":"Добавил время оформления, тип работы, дата исполнения во всех трех шаблонах, загрузил в изисофт.","Инициатор":"Владимир Абдуллаев","Крайний срок":"2026-04-27","Ответственный":["Аваз"],"Тема обращения":"Шаблон","Описание задачи / проблемы":"В бумажном варианте видна только дата начала заказ-наряда, нужно сделать чтобы и дата завершения именно в таком формате была видна. Добавить время оформления, тип работы тоже. Вов всех трех шаблонах"},{"Отдел":"HR","Апдейты":"Открыл доступ в Изисофт МС","Инициатор":"Эмир Нарметов","Крайний срок":"2026-04-27","Ответственный":["Аваз"],"Тема обращения":"изи софт открыть ","Описание задачи / проблемы":"Сервисный консультант Меггават Сервис Абдулахатов Камран  16 августа 1996"},{"Отдел":"IT-отдел","Апдейты":"Создал для каждого отдела свои гугл-таблицы.\nHR отдел\nIT отдел\nAXO\nБухгалтерия\nОП\nКлиентский сервис\nМаркетинг\n\nВ каждой таблице есть 4 столбца \n1. ФИО\n2. ПИНФЛ\n3. Отдел\n4. Что дает отдел сотруднику?\n\nОсновная таблица HR","Инициатор":"Нурхон Махмадиёров","Крайний срок":"2026-04-23","Ответственный":["Аваз"],"Тема обращения":"Найм и уволнение","Описание задачи / проблемы":"Увольнение сотрудников с обязательным удалением доступа к Битрикс24 и другим системам."},{"Отдел":"Отдел IT","Апдейты":null,"Инициатор":"Make","Крайний срок":"2026-04-27","Ответственный":null,"Тема обращения":"🛑 Сбой в сценарии","Описание задачи / проблемы":"🛑 Сбой в сценарии Статус PDI  готово 100%  \n\nСсылка: https://eu1.make.com/131055/scenarios/3521691/logs/9481094ac6994b4790ae0811969156ea"},{"Отдел":"Отдел IT","Апдейты":null,"Инициатор":"Make","Крайний срок":"2026-04-24","Ответственный":null,"Тема обращения":"🛑 Сбой в сценарии","Описание задачи / проблемы":"🛑 Сбой в сценарии Заявка на отгрузку \n\nСсылка: https://eu1.make.com/131055/scenarios/2426816/logs/c69b25c685a1453fb437bb202a89dd41"},{"Отдел":"Руководство","Апдейты":"Закрыл","Инициатор":"Улугбек Мурадович","Крайний срок":"2026-04-27","Ответственный":["Аваз"],"Тема обращения":"Закрыть доступ","Описание задачи / проблемы":"Нужно закрыть доступ Сарвар Кулдашев во всех системах"},{"Отдел":"IT-отдел","Апдейты":"Загрузил шаблон обходного листа в гугл-диск.\nНастроил автоматическое сформирование документа.\nДокумент отправляется в ТГ-группу","Инициатор":"Нурхон Махмадиёров","Крайний срок":"2026-04-23","Ответственный":["Аваз"],"Тема обращения":"Найм и уволнение","Описание задачи / проблемы":"Увольнение сотрудников с обязательным удалением доступа к Битрикс24 и другим системам."},{"Отдел":"Отдел IT","Апдейты":null,"Инициатор":"Make","Крайний срок":"2026-04-27","Ответственный":null,"Тема обращения":"🛑 Сбой в сценарии","Описание задачи / проблемы":"🛑 Сбой в сценарии Отгруженные машины \n\nСсылка: https://eu1.make.com/131055/scenarios/2178764/logs/d67f17ffa99842de9b35253544f08ffd"},{"Отдел":"Отдел IT","Апдейты":null,"Инициатор":"Make","Крайний срок":"2026-04-24","Ответственный":null,"Тема обращения":"🛑 Сбой в сценарии","Описание задачи / проблемы":"🛑 Сбой в сценарии М З PDI \n\nСсылка: https://eu1.make.com/131055/scenarios/3522013/logs/1312a49df1bd4fce96d89d87ad56b520"},{"Отдел":"BYD Service","Апдейты":"Во всех показателях изменил формулы, добавил фильтр проверки на статус заказ-наряда, кроме показателей PDI","Инициатор":"Владимир Абдуллаев","Крайний срок":"2026-04-27","Ответственный":["Аваз"],"Тема обращения":"Отчёт директора сервиса","Описание задачи / проблемы":"В отчёте все показатели должны быть со статусом выполнен (кроме PDI). Измени формулы"}];

			function formatDate(dateString) {
			    const date = new Date(dateString);
			    const day = String(date.getDate()).padStart(2, '0');
			    const month = String(date.getMonth() + 1).padStart(2, '0');
			    const year = date.getFullYear();
			    return `${day}.${month}.${year}`;
			}

			function formatDescription(description) {
			    return description.replace(/\n/g, '<br>');
			}

			const cardsContainer = document.getElementById('cardsContainer');
			requests.forEach(request => {
			    const card = document.createElement('div');
			    card.classList.add('card');

			    card.innerHTML = `
			        <div class="card-header">Инициатор: ${request['Инициатор']}</div>
			        <div class="card-body">
			            <div><span class="label">Отдел:</span><span class="label-value">${request['Отдел']}</span></div>
			            <div><span class="label">Ответственный:</span><span class="label-value">${request['Ответственный'] ? request['Ответственный'] : '-'}</span></div>
			            <div><span class="label">Крайний срок:</span><span class="label-value">${formatDate(request['Крайний срок'])}</span></div>
			            <div><span class="label">Тема обращения:</span><span class="label-value">${request['Тема обращения']}</span></div>
			            <div><span class="label">Описание задачи / проблемы:</span><span class="label-value">${formatDescription(request['Описание задачи / проблемы'])}</span></div>
			            <div><span class="label">Апдейты:</span><span class="label-value">${request['Апдейты'] ? request['Апдейты'] : ''}</span></div>
			        </div>
			    `;

			    cardsContainer.appendChild(card);
			});
		</script>
	</body>
