<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Выполненные задачи</title>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
		<style>
			body {
			    font-family: 'Roboto', sans-serif;
			    background-color: #f7f9fc;
			    color: #333;
			    margin: 0;
			    padding: 0;
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			}

			.container {
			    max-width: 1000px;
			    width: 100%;
			    padding: 20px;
			}

			h2 {
			    text-align: center;
			    color: #4CAF50;
			    margin-bottom: 20px;
			    font-size: 2.5em;
			    position: relative;
			}

			h2::after {
			    content: '';
			    display: block;
			    width: 50px;
			    height: 4px;
			    background-color: #4CAF50;
			    margin: 10px auto;
			    border-radius: 2px;
			}

			.card {
			    background: linear-gradient(145deg, #ffffff, #e6e6e6);
			    border: 1px solid #ddd;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			    padding: 20px;
			    margin: 20px 0;
			    border-radius: 12px;
			    transition: transform 0.3s ease, box-shadow 0.3s ease;
			    opacity: 0;
			    transform: translateY(20px);
			    animation: fadeInUp 0.5s forwards;
			}

			@keyframes fadeInUp {
			    to {
			        opacity: 1;
			        transform: translateY(0);
			    }
			}

			.card:hover {
			    transform: translateY(-10px);
			    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
			}

			.card-header {
			    font-weight: bold;
			    color: #444;
			    margin-bottom: 10px;
			    font-size: 1.4em;
			}

			.card-body {
			    display: flex;
			    flex-direction: column;
			}

			.card-body div {
			    margin: 10px 0;
			}

			.label {
			    font-weight: bold;
			    color: #555;
			}

			.label-value {
			    color: #666;
			    margin-left: 10px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Выполненные задачи за 11.06.2026</h2>

			<div id="cardsContainer"></div>
		</div>

		<script>
			const requests = [{"Отдел":"Маркетинг","Апдейты":"Создал в гугл-таблице 6 листа (Справочники)\nДобавил ID и название с Битрикса.\n1 - ID ответственного\n2 - DATA (Модел)\n3 - DATA (Причина провала)\n4 - DATA (Воронка)\n5 - DATA (Стадии Лида)\n6 - DATA (Стадии сделок)\nЭти справочники нужны чтобы в АПИ чинор отправлять человекочитаемое название значений для анализа данных.","Инициатор":"Олег Акишкин","Крайний срок":"2026-06-11","Ответственный":["Аваз"],"Тема обращения":"Chinor AI (API)","Описание задачи / проблемы":"Нужно добавить поля и отправит в АПИ Чинор.\nДобавление полей \n\nВоронка \nКатегория звонка (исход/вход)\nИмя файла \nКатегрия звонка (продажа, сервис)\nПовторное обращение - нужно обсудить отдельно \nИмя оператора \nМодель которую вбили в сделку \nМодель которая была озвучена клиентом первая \nПоле причина провала сделки из битрикса \nПричина провала сделки из речевого анализа  \nРешить вопрос как делаем обратную интеграцию в битрикс"},{"Отдел":"Маркетинг","Апдейты":"Редактировал скрипт Чинора, полученные данные отправляет в АПИ Чинор. Они получают вот в таком ввиде:\nИсходящий звонок:\ncrm_id  460547\nsource  OnlinePBX\ncrm_type  LEAD\nmodel_name  \nstage_name  Новые лиды\nfail_reason  \nhangup_cause  ATTENDED_TRANSFER\nsale_service  Продажа\ncall_duration  195\ncall_direction  outbound\nresponsible_id  17\ndialog_duration  186\ngoogle_sheet_row  8819\n\nВходящий звонок:\ncrm_id  316927\nsource  OnlinePBX\ncrm_type  LEAD\nmodel_name  Song Plus Champion DM-i\nstage_name  Целевой лид\nfail_reason  \nhangup_cause  NORMAL_CLEARING\nsale_service  Продажа\ncall_duration  111\ncall_direction  inbound\nresponsible_id  16317\ndialog_duration  56\ngoogle_sheet_row  8802\n\n\nВоронка - stage_name\nКатегория звонка (исход/вход) - call_direction\nИмя файла - crm_id\nКатегрия звонка (продажа, сервис) - sale_service\nМодель которую вбили в сделку - model_name\nПоле причина провала сделки из битрикса - fail_reason ","Инициатор":"Олег Акишкин","Крайний срок":"2026-06-11","Ответственный":["Аваз"],"Тема обращения":"Chinor AI (API)","Описание задачи / проблемы":"Нужно добавить поля и отправит в АПИ Чинор.\nДобавление полей \n\nВоронка \nКатегория звонка (исход/вход)\nИмя файла \nКатегрия звонка (продажа, сервис)\nПовторное обращение - нужно обсудить отдельно \nИмя оператора \nМодель которую вбили в сделку \nМодель которая была озвучена клиентом первая \nПоле причина провала сделки из битрикса \nПричина провала сделки из речевого анализа  \nРешить вопрос как делаем обратную интеграцию в битрикс"},{"Отдел":"IT-отдел","Апдейты":"Отправили письмо.\nИзменили сервер VDS virtual server CPU 2, RAM 2, SSD 50 GB с Centos 7 на ubuntu 22.04.","Инициатор":"Аваз Азизов","Крайний срок":"2026-06-11","Ответственный":["Аваз"],"Тема обращения":"Сервер телефонии","Описание задачи / проблемы":"Изменить сервер телефонии, отправить письмо директору Узтелеком"},{"Отдел":"Маркетинг","Апдейты":"Редактировал скрипт Б24, вытащил с битрикса все нужные поля которые написаны в описании. Скрипт ищет значения со справочников и записывает в основную таблицу.\nНапример:\nОтветственный\n2855 - Megawatt\n17 - BYD\nМодел\n4041\tYuan up EV\n4719\tYuan up DM-i\nПричина провала\n543\tОшибся номером\n545\tНе удалось дозвониться до клиента\nи так далее","Инициатор":"Олег Акишкин","Крайний срок":"2026-06-11","Ответственный":["Аваз"],"Тема обращения":"Chinor AI (API)","Описание задачи / проблемы":"Нужно добавить поля и отправит в АПИ Чинор.\nДобавление полей \n\nВоронка \nКатегория звонка (исход/вход)\nИмя файла \nКатегрия звонка (продажа, сервис)\nПовторное обращение - нужно обсудить отдельно \nИмя оператора \nМодель которую вбили в сделку \nМодель которая была озвучена клиентом первая \nПоле причина провала сделки из битрикса \nПричина провала сделки из речевого анализа  \nРешить вопрос как делаем обратную интеграцию в битрикс"}];

			function formatDate(dateString) {
			    const date = new Date(dateString);
			    const day = String(date.getDate()).padStart(2, '0');
			    const month = String(date.getMonth() + 1).padStart(2, '0');
			    const year = date.getFullYear();
			    return `${day}.${month}.${year}`;
			}

			function formatDescription(description) {
			    return description.replace(/\n/g, '<br>');
			}

			const cardsContainer = document.getElementById('cardsContainer');
			requests.forEach(request => {
			    const card = document.createElement('div');
			    card.classList.add('card');

			    card.innerHTML = `
			        <div class="card-header">Инициатор: ${request['Инициатор']}</div>
			        <div class="card-body">
			            <div><span class="label">Отдел:</span><span class="label-value">${request['Отдел']}</span></div>
			            <div><span class="label">Ответственный:</span><span class="label-value">${request['Ответственный'] ? request['Ответственный'] : '-'}</span></div>
			            <div><span class="label">Крайний срок:</span><span class="label-value">${formatDate(request['Крайний срок'])}</span></div>
			            <div><span class="label">Тема обращения:</span><span class="label-value">${request['Тема обращения']}</span></div>
			            <div><span class="label">Описание задачи / проблемы:</span><span class="label-value">${formatDescription(request['Описание задачи / проблемы'])}</span></div>
			            <div><span class="label">Апдейты:</span><span class="label-value">${request['Апдейты'] ? request['Апдейты'] : ''}</span></div>
			        </div>
			    `;

			    cardsContainer.appendChild(card);
			});
		</script>
	</body>
</html>
