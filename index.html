<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Выполненные задачи</title>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
		<style>
			body {
			    font-family: 'Roboto', sans-serif;
			    background-color: #f7f9fc;
			    color: #333;
			    margin: 0;
			    padding: 0;
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			}

			.container {
			    max-width: 1000px;
			    width: 100%;
			    padding: 20px;
			}

			h2 {
			    text-align: center;
			    color: #4CAF50;
			    margin-bottom: 20px;
			    font-size: 2.5em;
			    position: relative;
			}

			h2::after {
			    content: '';
			    display: block;
			    width: 50px;
			    height: 4px;
			    background-color: #4CAF50;
			    margin: 10px auto;
			    border-radius: 2px;
			}

			.card {
			    background: linear-gradient(145deg, #ffffff, #e6e6e6);
			    border: 1px solid #ddd;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			    padding: 20px;
			    margin: 20px 0;
			    border-radius: 12px;
			    transition: transform 0.3s ease, box-shadow 0.3s ease;
			    opacity: 0;
			    transform: translateY(20px);
			    animation: fadeInUp 0.5s forwards;
			}

			@keyframes fadeInUp {
			    to {
			        opacity: 1;
			        transform: translateY(0);
			    }
			}

			.card:hover {
			    transform: translateY(-10px);
			    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
			}

			.card-header {
			    font-weight: bold;
			    color: #444;
			    margin-bottom: 10px;
			    font-size: 1.4em;
			}

			.card-body {
			    display: flex;
			    flex-direction: column;
			}

			.card-body div {
			    margin: 10px 0;
			}

			.label {
			    font-weight: bold;
			    color: #555;
			}

			.label-value {
			    color: #666;
			    margin-left: 10px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Выполненные задачи за 24.03.2026</h2>

			<div id="cardsContainer"></div>
		</div>

		<script>
			const requests = [{"Отдел":"Бухгалтерия","Апдейты":"Создал шаблон \"Соглашение о бронирование Yuan Up DM-I\"\nНастроил подтягивание данных в шаблон. Загрузил в Изисофт.","Инициатор":"Анна Лебединская","Крайний срок":"2026-03-24","Ответственный":["Аваз"],"Тема обращения":"Шаблон для предзаказа YUAN UP DMI","Описание задачи / проблемы":"Нам с завтрашнего дня надо вот это соглашение о бронировании Юаня ДМИ добавить в изи\n\nЭто как бы предварительный договор, такие соглашения будут заключаться только с 23 по 26 марта, и уже с 27 марта будут заключаться наши обычные договоры на авто\nФайл шаблона отправила в Тг"},{"Отдел":"Отдел продаж","Апдейты":"В существующих записях изменил год выпуска на 2026 во всех виртуальный номерах чемпиона кроме Сонг про.","Инициатор":"Эмиль Граборский","Крайний срок":"2026-03-24","Ответственный":["Аваз"],"Тема обращения":"Год машин","Описание задачи / проблемы":"Нужно добавить 110 чёрный на белом чемп.\nЕсть старые, может просто год изменить?\nНаверное имеет смысл все 24 год кроме СоНГ Про изменить год"},{"Отдел":"Маркетинг","Апдейты":"Создал страницу (узб):\nhttps://byd.megawatt.uz/yuan_up_pred/uz\nДобавил фото, текст страницы.\nДобавил Баннер в главную страницу акции.","Инициатор":"Бекзод  Нематов","Крайний срок":"2026-03-24","Ответственный":["Аваз"],"Тема обращения":"Добавление акции","Описание задачи / проблемы":"Нужно добавить Акцию.\nYuan UP DM-i – oldindan buyurtma uchun eksklyuziv imkoniyatlar!\nFaqat 23–26 mart kunlari, avtomobil uchun 7 000 000 so‘m depozit to‘laganingizda siz quyidagilarga ega bo‘lasiz:\n - Maxsus moliyalashtirish shartlari\n - Eksklyuziv sovg‘alar\n - Avtomobilni birinchi bo‘lib olish imkoniyati\n - Test-drive’dan ustuvor tartibda foydalanish\nJoylar soni cheklangan. Eksklyuziv shartlarda birinchi bo‘lish imkoniyatini qo‘ldan boy bermang!\nFikringiz o’zgarsa depozit to‘liq qaytariladi, ammo qaytarishda bonuslar va imtiyozlar bekor qilinadi.\nBatafsil ma’lumot uchun qo‘ng‘iroq qiling\n55 510 11 11\nФото отправил по ТГ"},{"Отдел":"Сервис","Апдейты":"Скачал 3 шаблона заказ-наряда.\n1. Для клиентов\n2. Для Бухгалтерии\n3. Внутренний\nНаписал формулу подтягивание полей в печатной форме шаблона, загрузил в Изисофт.","Инициатор":"Владимир Абдуллаев","Крайний срок":"2026-03-24","Ответственный":["Аваз"],"Тема обращения":"Шаблон заказ-наряд","Описание задачи / проблемы":"Вот эти поля должны отображаться в печатной форме заказ-наряда.\n1. Со слов клиента\n2. Рекомендации\n3. Плательщик"},{"Отдел":"Маркетинг","Апдейты":"Создал страницу (рус):\nhttps://byd.megawatt.uz/yuan_up_pred/ru\nДобавил фото, текст страницы.\nДобавил Баннер в главную страницу акции.","Инициатор":"Бекзод  Нематов","Крайний срок":"2026-03-24","Ответственный":["Аваз"],"Тема обращения":"Добавление акции","Описание задачи / проблемы":"Нужно добавить Акцию.\nYuan UP DM-i - эксклюзивные возможности при предзаказе!\nТолько с 23 по 26 марта при внесении депозита 7 000 000 сум вы получаете:\n - Специальные условия финансирования\n - Эксклюзивные подарки\n - Приоритетная выдача авто\n - Приоритетный тест-драйв\nКоличество мест ограничено. Не упустите шанс войти в число первых владельцев на эксклюзивных условиях!\nВнесенный депозит является возвратным в полном объеме. При возврате условия бонусов теряются.\nДля подробной информации звоните\n 55 510 11 11\nФото отправил по ТГ"},{"Отдел":"Бухгалтерия","Апдейты":"Добавил в изисофт, в СРМ, ДБ настроил в автоматизациях. ","Инициатор":"Nurbek Khaydarov","Крайний срок":"2026-03-24","Ответственный":["Аваз"],"Тема обращения":"Новый цвет экстерьера","Описание задачи / проблемы":"Coral Orange шу рангни изига кошиб беринг ака, илтимос. SEALION 7 енги ранг экан."}];

			function formatDate(dateString) {
			    const date = new Date(dateString);
			    const day = String(date.getDate()).padStart(2, '0');
			    const month = String(date.getMonth() + 1).padStart(2, '0');
			    const year = date.getFullYear();
			    return `${day}.${month}.${year}`;
			}

			function formatDescription(description) {
			    return description.replace(/\n/g, '<br>');
			}

			const cardsContainer = document.getElementById('cardsContainer');
			requests.forEach(request => {
			    const card = document.createElement('div');
			    card.classList.add('card');

			    card.innerHTML = `
			        <div class="card-header">Инициатор: ${request['Инициатор']}</div>
			        <div class="card-body">
			            <div><span class="label">Отдел:</span><span class="label-value">${request['Отдел']}</span></div>
			            <div><span class="label">Ответственный:</span><span class="label-value">${request['Ответственный'] ? request['Ответственный'] : '-'}</span></div>
			            <div><span class="label">Крайний срок:</span><span class="label-value">${formatDate(request['Крайний срок'])}</span></div>
			            <div><span class="label">Тема обращения:</span><span class="label-value">${request['Тема обращения']}</span></div>
			            <div><span class="label">Описание задачи / проблемы:</span><span class="label-value">${formatDescription(request['Описание задачи / проблемы'])}</span></div>
			            <div><span class="label">Апдейты:</span><span class="label-value">${request['Апдейты'] ? request['Апдейты'] : ''}</span></div>
			        </div>
			    `;

			    cardsContainer.appendChild(card);
			});
		</script>
	</body>
</html>
