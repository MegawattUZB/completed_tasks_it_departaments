ame(\"DATA\");\n  const data = dataSheet.getDataRange().getValues();\n  const headers = data[0];\n\n  const date = new Date(selectedDate);\n  const day = date.getDate();\n\n  const totalDays = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();\n\n  const startRow = 2;\n  const rowsPerDay = 12;\n  const totalRows = rowsPerDay * totalDays;\n\n  const targetStart = startRow + (day - 1) * rowsPerDay;\n\n  // =========================\n  // 🔹 1. СКРЫТИЕ / ПОКАЗ ДНЯ\n  // =========================\n\n  sheet.hideRows(startRow, totalRows);\n  sheet.showRows(targetStart, rowsPerDay);\n\n\n  // =========================\n  // 🔹 2. ОЧИСТКА ЦВЕТА (ТОЛЬКО ВИДИМОГО ДНЯ)\n  // =========================\n\n  sheet.getRange(targetStart, 3, rowsPerDay, 23).setBackground(null);\n\n\n  // =========================\n  // 🔹 3. ПОИСК ДАННЫХ ПО ДАТЕ\n  // =========================\n\n  let targetRow = null;\n\n  for (let i = 1; i < data.length; i++) {\n    if (isSameDate(data[i][0], selectedDate)) {\n      targetRow = data[i];\n      break;\n    }\n  }\n\n  if (!targetRow) return;\n\n\n  // =========================\n  // 🔹 4. ПОДСВЕТКА\n  // =========================\n\n  const scheduleNames = sheet\n    .getRange(targetStart, 1, rowsPerDay, 1)\n    .getValues()\n    .flat();\n\n  scheduleNames.forEach((name, index) => {\n    if (!name) return;\n\n    const colIndex = headers.indexOf(name);\n    if (colIndex === -1) return;\n\n    const value = targetRow[colIndex];\n\n    // 🔥 если сотрудник НЕ работает (пусто)\n    if (!value) {\n      const rowOffset = index - (index % 3); // начало блока из 3 строк\n      const baseRow = targetStart + rowOffset;\n\n      sheet.getRange(baseRow, 3, 3, 23).setBackground(\"#ff4d4d\");\n    }\n  });\n}\n\n\n// =========================\n// 🔹 СРАВНЕНИЕ ДАТ\n// =========================\nfunction isSameDate(d1, d2) {\n  if (!d1 || !d2) return false;\n\n  const date1 = new Date(d1);\n  const date2 = new Date(d2);\n\n  return date1.getFullYear() === date2.getFullYear() &&\n         date1.getMonth() === date2.getMonth() &&\n         date1.getDate() === date2.getDate();\n}","Инициатор":"Владимир Абдуллаев","Крайний срок":"2026-03-31","Ответственный":["Нурхон"],"Тема обращения":"Календарь сервисных консультантов.","Описание задачи / проблемы":"Нужно сделать календарь сервисных консультантов. Таблицу отправил в тг. Нужно перенести в гугл-таблицу и сделать так чтобы у СК не рабочий день засвечивался красным цветом."},{"Отдел":"Отдел продаж","Апдейты":"Изменил формулу подсчета РОП/СМОПам.\nПо каждому пункту внес новые рассчеты.\nДобавил новый пункт DSE, %\nДобавил штрафы, премии.","Инициатор":"Pavel Popov","Крайний срок":"2026-03-31","Ответственный":["Аваз"],"Тема обращения":"Рассчет ЗП менеджеров","Описание задачи / проблемы":"Расчеты март должны быть по этим ФЗП. Измени рассчеты с марта.\nПНА, %\t\tMM, %\t\n0%\t0,0\t0%\t0\n80%\t0,5\t50%\t0,6\n90%\t0,8\t75%\t0,9\n100%\t1,0\t100%\t1\n110%\t1,2\t130%\t1,2\n120%\t1,3\t\t\nNPS,%\t\tДО, %\t\n0%\t-2,0\t0\t0\n85%\t1,0\t 1 000 000 \t0,5\n95%\t1,1\t 2 000 000 \t1,0\n\t\t 3 000 000 \t1,5\nDSE, %\t\t\tДополнительные условия:\t\tСумма\n0%\t-2,0\t\tЛига чемпионов\t\t 500 000 \n85%\t1,0\t\tКАСКО(за 1 шт)\t\t 100 000 \n\t\t\tАвто 90+ дней\t\t 500 000 \n\t\t\tПровал чек лист КЦ\t\t-1 000 000 \n\t\t\tКредит\t\t 1 000 000 \n\t\t\tПеревыполнение 150%\t\t 3 000 000 \n\t\t\tDSE (внутренний)\t\t-1 000 000 \n\nФайл отправил по ТГ\t\t\t\n\n"}];

			function formatDate(dateString) {

			    const month = String(date.getMonth() + 1).padStart(2, '0');
			    const year = date.getFullYear();
			    return `${day}.${month}.${year}`;
