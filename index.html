		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
		<style>
			body {
			    font-family: 'Roboto', sans-serif;
			    background-color: #f7f9fc;
			    color: #333;
			    margin: 0;
			    padding: 0;
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			}

			.container {
			    max-width: 1000px;
			    width: 100%;
			    padding: 20px;
			}

			h2 {
			    text-align: center;
			    color: #4CAF50;
			    margin-bottom: 20px;
			    font-size: 2.5em;
			    position: relative;
			}

			h2::after {
			    content: '';
			    display: block;
			    width: 50px;
			    height: 4px;
			    background-color: #4CAF50;
			    margin: 10px auto;
			    border-radius: 2px;
			}

			.card {
			    background: linear-gradient(145deg, #ffffff, #e6e6e6);
			    border: 1px solid #ddd;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			    padding: 20px;
			    margin: 20px 0;
			    border-radius: 12px;
			    transition: transform 0.3s ease, box-shadow 0.3s ease;
			    opacity: 0;
			    transform: translateY(20px);
			    animation: fadeInUp 0.5s forwards;
			}

			@keyframes fadeInUp {
			    to {
			        opacity: 1;
			        transform: translateY(0);
			    }
			}

			.card:hover {
			    transform: translateY(-10px);
			    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
			}

			.card-header {
			    font-weight: bold;
			    color: #444;
			    margin-bottom: 10px;
			    font-size: 1.4em;
			}

			.card-body {
			    display: flex;
			    flex-direction: column;
			}

			.card-body div {
			    margin: 10px 0;
			}

			.label {
			    font-weight: bold;
			    color: #555;
			}

			.label-value {
			    color: #666;
			    margin-left: 10px;
			}
		</style>
	</head>

л":"Маркетинг","Апдейты":"Все данные с файла перевел в гугл-таблицу.\nНастроил автоматизацию, вытащил ФИО и номер телефона всех клиентов с этого списка, добавил в гугл-таблицу. Скачал с гул-таблицы отправил по тг","Инициатор":"Владислав Садовой","Крайний срок":"2026-05-04","Ответственный":["Аваз"],"Тема обращения":"Прямой эфир","Описание задачи / проблемы":"Нам очень нужно выгрузить все номера телефонов и ФИО владельцев этих авто и вписать в эту же таблицу.\n\nПрямой эфир с розыгрышем 4 мая у нас будет, для этого нужны эти данные.\n\nФайл отправил в ТГ"},{"Отдел":"Отдел IT","Апдейты":null,"Инициатор":"Make","Крайний срок":"2026-05-04","Ответственный":null,"Тема обращения":"🛑 Сбой в сценарии","Описание задачи / проблемы":"🛑 Сбой в сценарии СРМ Заказ-наряда Service \n\nСсылка: https://eu1.make.com/131055/scenarios/2891195/logs/db75aa3e93784c8d835b1764d6c326b2"},{"Отдел":"Руководство","Апдейты":"Добавил план месяца.\nДобавил Ммикс/факт месяца.\n- каждому менеджеру.\n- РОПу\n- СМОПам","Инициатор":"Артем Григорьев","Крайний срок":"2026-05-04","Ответственный":["Аваз"],"Тема обращения":"Зарплата - План/Факт (Апрель)","Описание задачи / проблемы":"SUNTOWN\nПлан - 125\nMmix - 40\n\nНуржан Кошкаров\t15\t4 18 6\nШерзод Хасанов\t15\t4 11 0\nШахбоз Холтаев\t15\t4 12 5\nТуйчиева Муштарий\t10\t4 5 2\nОйбек Олимов\t10\t4 17 5\nШахзод Исмоилов\t15\t4 8 1\nОтабек Рустамов\t10\t4 11 0\nПавел Рагулин\t15\t4 14 3\nГуломов Акмал\t10\t4 3 3\nКолдашев Сарвар\t15\t4 4 0"}];

			function formatDate(dateString) {
			    const date = new Date(dateString);
			    const day = String(date.getDate()).padStart(2, '0');
			    const month = String(date.getMonth() + 1).padStart(2, '0');
			    const year = date.getFullYear();
			    return `${day}.${month}.${year}`;
			}

			function formatDescription(description) {
			    return description.replace(/\n/g, '<br>');
			}

			const cardsContainer = document.getElementById('cardsContainer');
			requests.forEach(request => {
			    const card = document.createElement('div');
			    card.classList.add('card');

			    card.innerHTML = `

			        <div class="card-body">
			            <div><span class="label">Отдел:</span><span class="label-value">${request['Отдел']}</span></div>
			            <div><span class="label">Ответственный:</span><span class="label-value">${request['Ответственный'] ? request['Ответственный'] : '-'}</span></div>
			            <div><span class="label">Крайний срок:</span><span class="label-value">${formatDate(request['Крайний срок'])}</span></div>
			            <div><span class="label">Тема обращения:</span><span class="label-value">${request['Тема обращения']}</span></div>
			            <div><span class="label">Описание задачи / проблемы:</span><span class="label-value">${formatDescription(request['Описание задачи / проблемы'])}</span></div>

			});
